<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Páscoa</title>
    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <p class="subtitle">Cardápio</p>
                <h1 class="main-title">Páscoa 2026</h1>
            </div>

            <div class="sidebar-middle">
                <!-- Decorative Circular Branding -->
                <div class="logo-wrapper">
                    <img src="logo.png" alt="Camila Santos Logo" class="logo-image">
                </div>
            </div>

            <div class="sidebar-bottom">
                <a href="https://wa.me/5541995832126" target="_blank" class="contact-link">
                    <i class="fab fa-whatsapp"></i>
                    <span>41 99583 2126</span>
                </a>
            </div>

            <!-- Subtle background leaves decoration in sidebar -->
            <div class="sidebar-decoration"></div>
        </aside>

        <!-- Main Content Menu Area -->
        <main class="menu-content">
            <div class="menu-grid" id="menu-container">
                <!-- Menu items injected via JavaScript -->
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>

</html>
